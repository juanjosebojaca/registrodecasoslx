<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lexington Recovery — Case Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d1117; font-family: 'Barlow', sans-serif; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    input, select, button, textarea { font-family: inherit; }
    input:focus, select:focus, textarea:focus { outline: none; }
    @keyframes pulse-dot  { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeIn     { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin       { to { transform: rotate(360deg); } }
    @keyframes slideDown  { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes alertPulse { 0%,100%{opacity:1} 50%{opacity:.6} }
  </style>
</head>
<body>
  <iframe id="append-frame" name="append-frame" style="display:none;" title="bg"></iframe>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── CONFIG ─────────────────────────────────────────────────────────────────
    // ⚠️ UPDATE THIS URL AFTER EVERY NEW APPS SCRIPT DEPLOY
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXwaqJQDK7VwxrVA4BCNdG-HDu_HU-6IlJOr1QUE5fAi7sHZWVEp-tUVUZWfnLcckh/exec";
    const ADMIN_PIN = "1219";
    const FORGOTTEN_MIN = 60; // minutes without activity before showing forgotten alert

    const S = { STARTED:"On this", PAUSED:"On Hold", RESUMED:"Resuming", DONE:"Done, Completed" };
    const C = {
      bg:"#0d1117", surface:"#161b22", surface2:"#21262d", border:"#30363d", borderActive:"#238636",
      blue:"#4d9cf8", green:"#3fb950", yellow:"#d29922", red:"#da3633",
      text:"#e6edf3", textMid:"#8b949e", textDim:"#484f58",
      mono:"'IBM Plex Mono', monospace", display:"'Barlow Condensed', sans-serif",
    };

    // ── MAINTENANCE MODE — stored in module-level var, set by admin ────────────
    // Using a simple ref-like object so it survives re-renders without context
    const MAINT = { active: false };

    // ── UTILS ──────────────────────────────────────────────────────────────────
    function makeCode()  { return `${Date.now()}${Math.floor(Math.random()*900000)+100000}`; }
    function delay(ms)   { return new Promise(r=>setTimeout(r,ms)); }
    function isToday(ts) { const d=new Date(ts),n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
    function getDateKey(ts){ const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
    function getWeekKey(d) { const m=new Date(d); m.setDate(d.getDate()-d.getDay()+1); return getDateKey(m); }
    function getMonthKey(d){ return `${d.getFullYear()}-${d.getMonth()}`; }
    function friendlyDate(dk){ return new Date(dk+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
    function fmtMin(min) { if(!min||min<0)return"0m"; const h=Math.floor(min/60),m=Math.round(min%60); return h>0?`${h}h ${m}m`:`${m}m`; }
    function formatElapsed(ms){ if(!ms||ms<0)return"0s"; const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; if(h>0)return`${h}h ${m}m`; if(m>0)return`${m}m ${sec}s`; return`${sec}s`; }
    function isWeekday(d){ const dow=new Date(d).getDay(); return dow!==0&&dow!==6; }
    function round1(n)   { return Math.round(n*10)/10; }
    function shortDate(ts){ const d=new Date(ts); return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); }
    function timeAgo(ts){
      const ms=Date.now()-new Date(ts).getTime();
      if(ms<0)return"just now";
      const sec=Math.floor(ms/1000);
      if(sec<60)return`${sec}s ago`;
      const min=Math.floor(sec/60);
      if(min<60)return`${min}m ago`;
      const hrs=Math.floor(min/60);
      if(hrs<24)return`${hrs}h ago`;
      return`${Math.floor(hrs/24)}d ago`;
    }

    function similarity(a,b){
      a=a.toLowerCase().trim();b=b.toLowerCase().trim();
      const m=a.length,n=b.length;
      if(m===0||n===0)return m===n?1:0;
      const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i===0?j:j===0?i:0));
      for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
        dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
      return 1-dp[m][n]/Math.max(m,n);
    }
    function groupProcessNames(names){
      const T=0.65,groups=[],assigned={};
      names.forEach(name=>{
        if(assigned[name]!==undefined)return;
        let found=false;
        for(const g of groups){if(similarity(name,g.canonical)>=T){g.members.push(name);assigned[name]=g.canonical;found=true;break;}}
        if(!found){groups.push({canonical:name,members:[name]});assigned[name]=name;}
      });
      return assigned;
    }
    function computeElapsed(events,now=Date.now()){
      let total=0,lastStart=null;
      for(const e of events){const t=new Date(e.ts).getTime();if(e.status===S.STARTED||e.status===S.RESUMED){lastStart=t;}else if((e.status===S.PAUSED||e.status===S.DONE)&&lastStart!==null){total+=t-lastStart;lastStart=null;}}
      if(lastStart!==null)total+=now-lastStart;
      return total;
    }
    function groupRows(rows){
      const map={};
      for(const r of rows){
        const [ts,,caseName,processName,status,urgent,notes,codigoUnico]=r;
        const dk=getDateKey(ts);
        const key=(codigoUnico&&String(codigoUnico).trim())?String(codigoUnico).trim():`${caseName}__${dk}`;
        if(!map[key])map[key]={key,caseName,processName,urgent:"No",notes:"",events:[],dk};
        map[key].events.push({ts,status,urgent,notes});
        if(urgent==="Si")map[key].urgent="Si";
        if(notes&&String(notes).trim())map[key].notes=String(notes).trim();
        map[key].processName=processName;
      }
      for(const k of Object.keys(map))map[k].events.sort((a,b)=>new Date(a.ts)-new Date(b.ts));
      return map;
    }
    function lastStatus(caso){const ev=caso.events;return ev.length?ev[ev.length-1].status:null;}
    function pauseCount(caso){return caso.events.filter(e=>e.status===S.PAUSED).length;}
    function sortCases(cases){
      const rank=s=>s===S.STARTED||s===S.RESUMED?0:s===S.PAUSED?1:2;
      return [...cases].sort((a,b)=>{const ra=rank(lastStatus(a)),rb=rank(lastStatus(b));if(ra!==rb)return ra-rb;return new Date(a.events[0].ts)-new Date(b.events[0].ts);});
    }

    // ── API ────────────────────────────────────────────────────────────────────
    function apiAppend(row){
      const img=new Image();
      img.src=`${APPS_SCRIPT_URL}?action=append&row=${encodeURIComponent(JSON.stringify(row))}`;
      return Promise.resolve({success:true});
    }
    async function apiFetch(email){
      const since=new Date();since.setDate(since.getDate()-30);
      const url=`${APPS_SCRIPT_URL}?action=getByEmail&email=${encodeURIComponent(email)}&sheetName=Eventos&since=${encodeURIComponent(since.toISOString())}`;
      const res=await fetch(url,{redirect:"follow"});
      if(!res.ok)throw new Error("Failed");
      const d=await res.json();
      return d.rows||[];
    }
    async function apiFetchReport(){
      const res=await fetch(`${APPS_SCRIPT_URL}?action=getReport`,{redirect:"follow"});
      if(!res.ok)throw new Error("Failed");
      const d=await res.json();
      return d.rows||[];
    }

    // ── REPORT PARSER ──────────────────────────────────────────────────────────
    function parseReportRows(rows){
      const allProcNames=[];
      rows.forEach(r=>{const p=String(r[2]).trim();if(p&&!allProcNames.includes(p))allProcNames.push(p);});
      const pgm=groupProcessNames(allProcNames);
      const now=new Date(),empMap={},procMap={};
      const ago30=new Date();ago30.setDate(ago30.getDate()-30);
      rows.forEach(row=>{
        const uid=String(row[0]).trim(),caseName=String(row[1]).trim();
        const email=String(row[3]).trim(),startR=row[4],endR=row[5];
        const urgent=String(row[6]||"").trim(),notes=String(row[7]||"").trim();
        const procR=String(row[2]).trim(),timeMin=parseFloat(row[18])||0;
        const autoClosed=notes.indexOf("[Auto-closed at 6PM]")>=0;
        if(!startR||!endR)return;
        const startD=startR instanceof Date?startR:new Date(startR);
        if(isNaN(startD)||!isWeekday(startD))return;
        const proc=pgm[procR]||procR,dk=getDateKey(startD),wk=getWeekKey(startD),mk=getMonthKey(startD);
        if(!empMap[email])empMap[email]={
          email,name:email.split("@")[0],
          byDay:{},byWeek:{},byMonth:{},
          totalMin:0,totalCases:0,byProcess:{},
          autoClosed:0,allCaseDetails:[],
          lastEventTs:null
        };
        const e=empMap[email];
        e.totalMin+=timeMin;e.totalCases+=1;
        const endD=endR instanceof Date?endR:new Date(endR);
        if(!e.lastEventTs||endD>new Date(e.lastEventTs))e.lastEventTs=endD.toISOString();
        const inLast30=startD>=ago30;
        // store dk so we can look up cases by day in the breakdown
        e.allCaseDetails.push({caseName,processName:proc,timeMin,urgent,notes,autoClosed,startD,inLast30,dk});
        if(autoClosed)e.autoClosed+=1;
        if(!e.byDay[dk])e.byDay[dk]={cases:0,totalMin:0};
        if(!e.byWeek[wk])e.byWeek[wk]={cases:0,totalMin:0};
        if(!e.byMonth[mk])e.byMonth[mk]={cases:0,totalMin:0};
        if(!e.byProcess[proc])e.byProcess[proc]={cases:0,totalMin:0};
        e.byDay[dk].cases++;e.byDay[dk].totalMin+=timeMin;
        e.byWeek[wk].cases++;e.byWeek[wk].totalMin+=timeMin;
        e.byMonth[mk].cases++;e.byMonth[mk].totalMin+=timeMin;
        e.byProcess[proc].cases++;e.byProcess[proc].totalMin+=timeMin;
        if(!procMap[proc])procMap[proc]={cases:0,totalMin:0};
        procMap[proc].cases++;procMap[proc].totalMin+=timeMin;
      });
      return {empMap,procMap,now};
    }

    // ── SHARED COMPONENTS ──────────────────────────────────────────────────────
    const GridBg=()=>(<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,backgroundImage:`linear-gradient(rgba(48,54,61,0.25) 1px,transparent 1px),linear-gradient(90deg,rgba(48,54,61,0.25) 1px,transparent 1px)`,backgroundSize:"40px 40px"}}/>);
    const LxLogo=({size=48})=>(<div style={{width:size,height:size,borderRadius:size*0.22,background:"linear-gradient(135deg,#4d9cf8 0%,#1a5ccf 100%)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{fontFamily:C.display,fontWeight:800,fontSize:size*0.38,color:"#0d1117"}}>LX</span></div>);

    // ── FEAT 6: FOOTER ─────────────────────────────────────────────────────────
    const Footer=()=>(
      <div style={{textAlign:"center",padding:"20px 24px 12px",fontFamily:C.mono,fontSize:10,color:C.textDim,borderTop:`1px solid ${C.border}`,marginTop:32}}>
        Lexington Case Tracker – Built and maintained by Juan José Bojacá, Lexington Recovery and Amsterdam Capital Group Supervisor
      </div>
    );

    // ── FEAT 5: MAINTENANCE BANNER ─────────────────────────────────────────────
    function MaintenanceBanner(){
      return(
        <div style={{background:"#1c1000",border:`1px solid ${C.yellow}`,borderRadius:0,padding:"10px 24px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:200}}>
          <span style={{fontSize:16}}>🔧</span>
          <span style={{fontFamily:C.mono,fontSize:12,color:C.yellow,fontWeight:600}}>System under maintenance. Please wait.</span>
        </div>
      );
    }

    function StatCard({label,value,sub,color,onClick,active}){
      return(<div onClick={onClick} style={{background:C.surface,border:`1px solid ${active?color||C.blue:C.border}`,borderRadius:10,padding:"14px 16px",cursor:onClick?"pointer":"default",transition:"border-color 0.2s"}}>
        <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.08em",marginBottom:6}}>{label}</div>
        <div style={{fontFamily:C.display,fontWeight:800,fontSize:22,color:color||C.text}}>{value}</div>
        {sub&&<div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,marginTop:3}}>{sub}</div>}
      </div>);
    }
    function BarChart({labels,datasets,height=180}){
      const ref=useRef(null),chartRef=useRef(null);
      useEffect(()=>{
        if(!ref.current)return;
        if(chartRef.current)chartRef.current.destroy();
        chartRef.current=new Chart(ref.current,{type:"bar",data:{labels,datasets:datasets.map(d=>({...d,borderRadius:4,borderSkipped:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:C.textMid,font:{size:9}},grid:{color:"#21262d"}},y:{ticks:{color:C.textMid,font:{size:9}},grid:{color:"#21262d"},beginAtZero:true}}}});
        return()=>{if(chartRef.current)chartRef.current.destroy();};
      },[JSON.stringify({labels,datasets})]);
      return <div style={{position:"relative",height}}><canvas ref={ref}/></div>;
    }
    function DoughnutChart({labels,data,colors,height=180}){
      const ref=useRef(null),chartRef=useRef(null);
      useEffect(()=>{
        if(!ref.current)return;
        if(chartRef.current)chartRef.current.destroy();
        chartRef.current=new Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderColor:C.bg,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:"65%"}});
        return()=>{if(chartRef.current)chartRef.current.destroy();};
      },[JSON.stringify({labels,data,colors})]);
      return <div style={{position:"relative",height}}><canvas ref={ref}/></div>;
    }

    // ── FORGOTTEN CASES ALERT ──────────────────────────────────────────────────
    function ForgottenCasesAlert({cases,now}){
      const forgotten=cases.filter(c=>{
        const ls=lastStatus(c);
        if(ls===S.DONE)return false;
        const lastEv=c.events[c.events.length-1];
        return(now-new Date(lastEv.ts).getTime())/60000>=FORGOTTEN_MIN;
      });
      if(forgotten.length===0)return null;
      return(
        <div style={{background:"#1a0d0d",border:`1px solid ${C.red}`,borderLeft:`4px solid ${C.red}`,borderRadius:10,padding:"12px 16px",marginBottom:20,animation:"alertPulse 3s ease infinite"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:14}}>🚨</span>
            <span style={{fontFamily:C.mono,fontSize:11,color:C.red,fontWeight:600,letterSpacing:"0.08em"}}>
              {forgotten.length} OPEN CASE{forgotten.length>1?"S":""} WITH NO ACTIVITY
            </span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {forgotten.map((c,i)=>{
              const lastEv=c.events[c.events.length-1];
              const ls=lastStatus(c);
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span style={{fontFamily:C.display,fontWeight:700,fontSize:13,color:C.text}}>{c.caseName}</span>
                  <span style={{fontFamily:C.mono,fontSize:10,color:C.textMid}}>◎ {c.processName}</span>
                  <span style={{fontFamily:C.mono,fontSize:10,color:ls===S.PAUSED?"#ffd666":C.textMid}}>{ls===S.PAUSED?"on hold":"active"}</span>
                  <span style={{fontFamily:C.mono,fontSize:10,color:C.red,marginLeft:"auto"}}>{timeAgo(lastEv.ts)}</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── ACTIVITY STATUS (for admin view) ──────────────────────────────────────
    function getActivityStatus(emp,now){
      if(!emp.lastEventTs)return{status:"inactive",label:"No data",color:C.textDim};
      const min=(now-new Date(emp.lastEventTs).getTime())/60000;
      if(min<30) return{status:"active",  label:"Active",   color:C.green};
      if(min<180)return{status:"recent",  label:"Recent",   color:C.yellow};
      return         {status:"inactive",  label:"Inactive", color:C.textDim};
    }
    function ActivityBadge({status,label,color}){
      return(
        <div style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:color,display:"inline-block",animation:status==="active"?"pulse-dot 1.5s infinite":"none",flexShrink:0}}/>
          <span style={{fontFamily:C.mono,fontSize:10,color}}>{label}</span>
        </div>
      );
    }

    // ── FEAT 3: MY STATUS WIDGET (employee own status) ─────────────────────────
    // Computes activity from the user's own rows (last 30 days fetched data)
    function MyStatusWidget({rows}){
      const [now,setNow]=useState(Date.now());
      useEffect(()=>{const id=setInterval(()=>setNow(Date.now()),30000);return()=>clearInterval(id);},[]);
      if(!rows||rows.length===0)return null;
      // find most recent event timestamp from user's own rows
      const lastTs=rows.reduce((max,r)=>{const t=new Date(r[0]).getTime();return t>max?t:max;},0);
      if(!lastTs)return null;
      const min=(now-lastTs)/60000;
      let status,label,color,dot;
      if(min<30){status="active";label="Active";color=C.green;dot=true;}
      else if(min<180){status="recent";label="Recent";color=C.yellow;dot=false;}
      else{status="inactive";label="Inactive";color=C.textDim;dot=false;}
      return(
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,fontSize:11}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:color,display:"inline-block",animation:dot?"pulse-dot 1.5s infinite":"none",flexShrink:0}}/>
          <span style={{fontFamily:C.mono,color,fontWeight:600}}>{status==="active"?"🟢":status==="recent"?"🟡":"⚫"} {label}</span>
          <span style={{fontFamily:C.mono,color:C.textDim}}>·</span>
          <span style={{fontFamily:C.mono,color:C.textMid}}>Last activity: {timeAgo(lastTs)}</span>
        </div>
      );
    }

    // ── ADMIN PIN ──────────────────────────────────────────────────────────────
    function AdminLogin({onSuccess,onBack}){
      const [pin,setPin]=useState(""),[err,setErr]=useState(""),[shake,setShake]=useState(false);
      const press=(d)=>{
        if(pin.length>=4)return;
        const next=pin+d;setPin(next);
        if(next.length===4){
          if(next===ADMIN_PIN){onSuccess();}
          else{setErr("Incorrect PIN");setShake(true);setTimeout(()=>{setPin("");setShake(false);setErr("");},700);}
        }
      };
      const digits=["1","2","3","4","5","6","7","8","9","","0","⌫"];
      return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",position:"relative"}}><GridBg/><div style={{zIndex:1,width:"100%",maxWidth:340,animation:"fadeIn 0.3s ease"}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:32,justifyContent:"center"}}><LxLogo size={44}/><div><div style={{fontFamily:C.display,fontWeight:800,fontSize:22,color:C.text}}>Admin Access</div><div style={{fontFamily:C.mono,fontSize:11,color:C.textMid}}>Enter 4-digit PIN</div></div></div><div style={{background:C.surface,border:`1px solid ${shake?C.red:C.border}`,borderRadius:16,padding:"28px 24px",transition:"border-color 0.2s"}}><div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:24}}>{[0,1,2,3].map(i=>(<div key={i} style={{width:14,height:14,borderRadius:"50%",background:pin.length>i?C.blue:C.surface2,border:`2px solid ${pin.length>i?C.blue:C.border}`,transition:"all 0.15s"}}/>))}</div>{err&&<div style={{fontFamily:C.mono,fontSize:11,color:C.red,textAlign:"center",marginBottom:16}}>{err}</div>}<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{digits.map((d,i)=>(<button key={i} onClick={()=>d==="⌫"?setPin(p=>p.slice(0,-1)):d?press(d):null} style={{padding:"16px",background:d?C.surface2:"transparent",border:`1px solid ${d?C.border:"transparent"}`,borderRadius:10,color:d==="⌫"?C.textMid:C.text,fontSize:d==="⌫"?18:20,fontWeight:700,cursor:d?"pointer":"default",fontFamily:C.display,transition:"background 0.1s"}}>{d}</button>))}</div></div><button onClick={onBack} style={{width:"100%",marginTop:16,padding:"10px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:10,color:C.textMid,fontFamily:C.mono,fontSize:12,cursor:"pointer"}}>← Back to App</button></div></div>);
    }

    // ── ADMIN OVERVIEW ─────────────────────────────────────────────────────────
    function AdminOverview({parsed}){
      const {empMap,procMap,now}=parsed;
      const emps=Object.values(empMap).sort((a,b)=>b.totalCases-a.totalCases);
      const todayK=getDateKey(now),weekK=getWeekKey(now),monthK=getMonthKey(now);
      const totalToday=emps.reduce((s,e)=>s+(e.byDay[todayK]?e.byDay[todayK].cases:0),0);
      const totalWeek=emps.reduce((s,e)=>s+(e.byWeek[weekK]?e.byWeek[weekK].cases:0),0);
      const totalMonth=emps.reduce((s,e)=>s+(e.byMonth[monthK]?e.byMonth[monthK].cases:0),0);
      const allTimes=emps.flatMap(e=>e.allCaseDetails.map(c=>c.timeMin));
      const avgTime=allTimes.length>0?round1(allTimes.reduce((a,b)=>a+b,0)/allTimes.length):0;
      const topProcs=Object.entries(procMap).map(([p,v])=>({p,cases:v.cases,avg:v.cases>0?round1(v.totalMin/v.cases):0})).sort((a,b)=>b.avg-a.avg).slice(0,5);
      const allProcs=Object.entries(procMap).sort((a,b)=>b[1].cases-a[1].cases).slice(0,8).map(e=>e[0]);
      const palette=["#4d9cf8","#3fb950","#d29922","#da3633","#a371f7","#f78166","#ffa657","#79c0ff"];
      return(<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          <StatCard label="CASES TODAY"      value={totalToday}     sub="all employees" color={C.green}/>
          <StatCard label="CASES THIS WEEK"  value={totalWeek}      sub="weekdays only" color={C.blue}/>
          <StatCard label="CASES THIS MONTH" value={totalMonth}     color={C.text}/>
          <StatCard label="AVG TIME / CASE"  value={fmtMin(avgTime)} sub="all employees" color={C.yellow}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1.6fr 1fr",gap:16,marginBottom:24}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>CASES THIS WEEK BY EMPLOYEE</div>
            <BarChart labels={emps.map(e=>e.name)} datasets={[{label:"Cases",data:emps.map(e=>e.byWeek[weekK]?e.byWeek[weekK].cases:0),backgroundColor:palette.slice(0,emps.length)}]} height={160}/>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>TOP PROCESSES</div>
            <DoughnutChart labels={topProcs.map(p=>p.p)} data={topProcs.map(p=>p.cases)} colors={palette} height={150}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>{topProcs.map((p,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:palette[i],flexShrink:0}}/><span style={{fontFamily:C.mono,fontSize:9,color:C.textMid}}>{p.p} ({p.cases})</span></div>))}</div>
          </div>
        </div>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:24,overflowX:"auto"}}>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>EMPLOYEE PERFORMANCE</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead><tr>{["Employee","Activity","Last seen","Today","This Week","This Month","Time/Week","Avg/Case","Auto-Closed"].map((h,i)=>(<th key={i} style={{padding:"8px 12px",background:C.surface2,color:C.blue,fontFamily:C.mono,fontSize:10,textAlign:"left",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>))}</tr></thead>
            <tbody>{emps.map((e,idx)=>{
              const td=e.byDay[todayK]?e.byDay[todayK].cases:0,wk=e.byWeek[weekK]?e.byWeek[weekK].cases:0,mk=e.byMonth[monthK]?e.byMonth[monthK].cases:0;
              const wkMin=e.byWeek[weekK]?e.byWeek[weekK].totalMin:0,avg=e.totalCases>0?round1(e.totalMin/e.totalCases):0;
              const rb=idx%2===0?C.surface:C.surface2;
              const act=getActivityStatus(e,now);
              return(<tr key={idx}>
                <td style={{padding:"9px 12px",background:rb,color:C.text,fontFamily:C.display,fontWeight:700,fontSize:14,borderBottom:`1px solid ${C.border}`}}>{e.name}</td>
                <td style={{padding:"9px 12px",background:rb,borderBottom:`1px solid ${C.border}`}}><ActivityBadge status={act.status} label={act.label} color={act.color}/></td>
                <td style={{padding:"9px 12px",background:rb,fontFamily:C.mono,fontSize:10,color:act.color,borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{e.lastEventTs?timeAgo(e.lastEventTs):"—"}</td>
                {[td,wk,mk,fmtMin(wkMin),fmtMin(avg),e.autoClosed].map((v,i)=>(<td key={i} style={{padding:"9px 12px",background:rb,color:i===5&&v>0?C.yellow:C.textMid,fontFamily:C.mono,fontWeight:400,fontSize:11,borderBottom:`1px solid ${C.border}`}}>{v}</td>))}
              </tr>);
            })}</tbody>
          </table>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>TOP 5 SLOWEST PROCESSES</div>
            {topProcs.map((p,i)=>{const rc=[C.red,C.yellow,C.textMid,C.textMid,C.textMid][i],pct=topProcs[0].avg>0?p.avg/topProcs[0].avg*100:0;return(<div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><span style={{fontFamily:C.mono,fontSize:11,color:rc,fontWeight:700,width:16}}>#{i+1}</span><span style={{fontFamily:C.display,fontWeight:700,fontSize:13,color:C.text,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.p}</span><span style={{fontFamily:C.mono,fontSize:11,color:C.blue,flexShrink:0}}>{fmtMin(p.avg)}</span><div style={{width:60,height:5,background:C.surface2,borderRadius:3,flexShrink:0}}><div style={{width:`${pct}%`,height:"100%",background:rc,borderRadius:3}}/></div></div>);})}
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,overflowX:"auto"}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>CASES BY PROCESS (TOP 8)</div>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
              <thead><tr><th style={{padding:"4px 6px",background:C.surface2,color:C.blue,fontFamily:C.mono,textAlign:"left",borderBottom:`1px solid ${C.border}`}}>Emp</th>{allProcs.map((p,i)=><th key={i} style={{padding:"4px 6px",background:C.surface2,color:C.blue,fontFamily:C.mono,textAlign:"center",borderBottom:`1px solid ${C.border}`,maxWidth:60,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</th>)}</tr></thead>
              <tbody>{emps.map((e,idx)=>(<tr key={idx}><td style={{padding:"4px 6px",background:idx%2===0?C.surface:C.surface2,color:C.text,fontFamily:C.display,fontWeight:700,fontSize:11,borderBottom:`1px solid ${C.border}`}}>{e.name}</td>{allProcs.map((p,i)=>{const cnt=e.byProcess[p]?e.byProcess[p].cases:0;return<td key={i} style={{padding:"4px 6px",background:idx%2===0?C.surface:C.surface2,color:cnt===0?C.textDim:C.green,fontFamily:C.mono,textAlign:"center",borderBottom:`1px solid ${C.border}`}}>{cnt||"—"}</td>;})}</tr>))}</tbody>
            </table>
          </div>
        </div>
      </div>);
    }

    // ── EMPLOYEE DETAIL ────────────────────────────────────────────────────────
    function EmployeeDetail({emp,now}){
      const [showSlowest,setShowSlowest]=useState(false);
      const [showUrgent,setShowUrgent]=useState(true);
      // FEAT 1: track which days are expanded in daily breakdown
      const [expandedDays,setExpandedDays]=useState({});
      const toggleDay=(dk)=>setExpandedDays(prev=>({...prev,[dk]:!prev[dk]}));

      const todayK=getDateKey(now),weekK=getWeekKey(now),monthK=getMonthKey(now);
      const sortedByTime=emp.allCaseDetails.slice().sort((a,b)=>a.timeMin-b.timeMin);
      const fastest=sortedByTime[0]?round1(sortedByTime[0].timeMin):0;
      const slowest=sortedByTime[sortedByTime.length-1]?round1(sortedByTime[sortedByTime.length-1].timeMin):0;
      const avgTime=emp.totalCases>0?round1(emp.totalMin/emp.totalCases):0;
      const wkMin=emp.byWeek[weekK]?emp.byWeek[weekK].totalMin:0;
      const top5Slowest=emp.allCaseDetails.slice().sort((a,b)=>b.timeMin-a.timeMin).slice(0,5);
      const urgentCases=emp.allCaseDetails.filter(c=>c.urgent==="Si"&&c.inLast30).sort((a,b)=>b.startD-a.startD);
      const act=getActivityStatus(emp,now);
      const last14=[]; const d=new Date(now); d.setHours(0,0,0,0);
      while(last14.length<14){if(d.getDay()!==0&&d.getDay()!==6)last14.unshift(getDateKey(new Date(d)));d.setDate(d.getDate()-1);}
      const procEntries=Object.entries(emp.byProcess).sort((a,b)=>b[1].cases-a[1].cases).slice(0,6);
      const procColors=["#4d9cf8","#3fb950","#d29922","#da3633","#a371f7","#f78166"];
      const last10=last14.slice(-10);

      return(<div>
        {/* Activity banner */}
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20,padding:"12px 16px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:10}}>
          <span style={{fontFamily:C.display,fontWeight:700,fontSize:16,color:C.text}}>{emp.name}</span>
          <ActivityBadge status={act.status} label={act.label} color={act.color}/>
          <div style={{marginLeft:"auto",fontFamily:C.mono,fontSize:11,color:act.color}}>
            {emp.lastEventTs?`Last activity: ${timeAgo(emp.lastEventTs)}`:"No recent activity"}
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          <StatCard label="CASES TODAY"      value={emp.byDay[todayK]?emp.byDay[todayK].cases:0} color={C.green}/>
          <StatCard label="CASES THIS WEEK"  value={emp.byWeek[weekK]?emp.byWeek[weekK].cases:0} color={C.blue}/>
          <StatCard label="CASES THIS MONTH" value={emp.byMonth[monthK]?emp.byMonth[monthK].cases:0}/>
          <StatCard label="TIME THIS WEEK"   value={fmtMin(wkMin)} color={C.yellow}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          <StatCard label="AVG TIME / CASE" value={fmtMin(avgTime)}/>
          <StatCard label="FASTEST CASE"    value={fmtMin(fastest)} color={C.green}/>
          <div onClick={()=>setShowSlowest(v=>!v)} style={{background:C.surface,border:`1px solid ${showSlowest?C.red:C.border}`,borderRadius:10,padding:"14px 16px",cursor:"pointer",transition:"border-color 0.2s"}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.08em",marginBottom:6,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span>SLOWEST CASE</span>
              <span style={{color:C.textDim,fontSize:9,background:C.surface2,padding:"1px 5px",borderRadius:6}}>{showSlowest?"▲":"▼ top 5"}</span>
            </div>
            <div style={{fontFamily:C.display,fontWeight:800,fontSize:22,color:C.red}}>{fmtMin(slowest)}</div>
            <div style={{fontFamily:C.mono,fontSize:9,color:C.textDim,marginTop:3}}>click for details</div>
          </div>
          <StatCard label="AUTO-CLOSED" value={emp.autoClosed} color={emp.autoClosed>3?C.yellow:C.textMid}/>
        </div>
        {showSlowest&&top5Slowest.length>0&&(
          <div style={{background:C.surface,border:`1px solid ${C.red}`,borderRadius:12,padding:16,marginBottom:24,animation:"slideDown 0.2s ease"}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.red,letterSpacing:"0.1em",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
              <span>🐢 TOP 5 SLOWEST CASES</span><span style={{color:C.textDim,fontWeight:400}}>— {emp.totalCases} total cases</span>
            </div>
            {top5Slowest.map((c,i)=>{
              const rc=[C.red,C.yellow,C.textMid,C.textMid,C.textMid][i];
              const cleanNotes=c.notes?c.notes.replace(" [Auto-closed at 6PM]","").trim():"";
              return(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 14px",background:i%2===0?C.surface2:C.bg,borderRadius:8,marginBottom:6,borderLeft:`3px solid ${rc}`}}>
                <span style={{fontFamily:C.mono,fontWeight:700,fontSize:14,color:rc,width:24,flexShrink:0,paddingTop:1}}>#{i+1}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontFamily:C.display,fontWeight:700,fontSize:15,color:C.text}}>{c.caseName}</span>
                    {c.urgent==="Si"&&<span style={{fontFamily:C.mono,fontSize:10,color:"#ffd666",background:"#2d1b00",padding:"2px 7px",borderRadius:10,flexShrink:0}}>⚡ URGENT</span>}
                    {c.autoClosed?<span style={{fontFamily:C.mono,fontSize:10,color:C.textMid,background:C.surface2,padding:"2px 7px",borderRadius:10,flexShrink:0}}>🤖 Auto-closed</span>:<span style={{fontFamily:C.mono,fontSize:10,color:C.green,background:"#1a2d1a",padding:"2px 7px",borderRadius:10,flexShrink:0}}>✓ Manual</span>}
                  </div>
                  <div style={{fontFamily:C.mono,fontSize:11,color:C.textMid,marginBottom:cleanNotes?6:0}}><span style={{color:C.textDim}}>◎</span> {c.processName}<span style={{color:C.textDim}}> · </span><span style={{color:C.blue,fontWeight:600}}>{fmtMin(c.timeMin)}</span></div>
                  {cleanNotes&&(<div style={{display:"flex",gap:6,alignItems:"flex-start",background:"#1c2128",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 8px"}}><span style={{fontSize:11,flexShrink:0}}>📝</span><span style={{fontFamily:C.mono,fontSize:10,color:C.textMid,lineHeight:1.5,wordBreak:"break-word"}}>{cleanNotes}</span></div>)}
                </div>
              </div>);
            })}
          </div>
        )}
        {urgentCases.length>0&&(
          <div style={{background:C.surface,border:`1px solid #7c5800`,borderRadius:12,marginBottom:24}}>
            <div onClick={()=>setShowUrgent(v=>!v)} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 16px",cursor:"pointer",userSelect:"none"}}>
              <span style={{fontFamily:C.mono,fontSize:10,color:"#ffd666",letterSpacing:"0.1em",flex:1}}>⚡ URGENT CASES — LAST 30 DAYS</span>
              <span style={{background:"#2d1b00",color:"#ffd666",padding:"1px 8px",borderRadius:10,fontSize:11,fontWeight:700}}>{urgentCases.length}</span>
              <span style={{fontFamily:C.mono,fontSize:10,color:C.textDim,marginLeft:4}}>{showUrgent?"▲":"▼"}</span>
            </div>
            {showUrgent&&(
              <div style={{padding:"0 16px 14px",animation:"slideDown 0.15s ease"}}>
                {urgentCases.map((c,i)=>{
                  const cleanNotes=c.notes?c.notes.replace(" [Auto-closed at 6PM]","").trim():"";
                  return(<div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:C.surface2,borderRadius:8,borderLeft:`3px solid #7c5800`,marginBottom:6}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                        <span style={{fontFamily:C.display,fontWeight:700,fontSize:14,color:C.text}}>{c.caseName}</span>
                        <span style={{fontFamily:C.mono,fontSize:10,color:C.textDim,background:C.bg,padding:"1px 6px",borderRadius:6}}>{shortDate(c.startD)}</span>
                        {c.autoClosed&&<span style={{fontFamily:C.mono,fontSize:10,color:C.textMid,background:C.bg,padding:"1px 6px",borderRadius:8,flexShrink:0}}>🤖 Auto-closed</span>}
                        {!c.autoClosed&&<span style={{fontFamily:C.mono,fontSize:10,color:C.green,background:"#1a2d1a",padding:"1px 6px",borderRadius:8,flexShrink:0}}>✓ Manual</span>}
                      </div>
                      <div style={{fontFamily:C.mono,fontSize:11,color:C.textMid,marginBottom:cleanNotes?4:0}}><span style={{color:C.textDim}}>◎</span> {c.processName}<span style={{color:C.textDim}}> · </span><span style={{color:C.blue}}>{fmtMin(c.timeMin)}</span></div>
                      {cleanNotes&&(<div style={{display:"flex",gap:6,alignItems:"flex-start",background:C.bg,borderRadius:5,padding:"4px 8px",marginTop:3}}><span style={{fontSize:10,flexShrink:0}}>📝</span><span style={{fontFamily:C.mono,fontSize:10,color:C.textMid,lineHeight:1.5,wordBreak:"break-word"}}>{cleanNotes}</span></div>)}
                    </div>
                  </div>);
                })}
              </div>
            )}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1.6fr 1fr",gap:16,marginBottom:24}}>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>DAILY CASES — LAST 14 WEEKDAYS</div>
            <BarChart labels={last14.map(dk=>{const d2=new Date(dk+"T12:00:00");return d2.toLocaleDateString("en-US",{month:"short",day:"numeric"});})} datasets={[{label:"Cases",data:last14.map(dk=>emp.byDay[dk]?emp.byDay[dk].cases:0),backgroundColor:C.blue}]} height={160}/>
          </div>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
            <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>CASES BY PROCESS</div>
            <DoughnutChart labels={procEntries.map(([p])=>p)} data={procEntries.map(([,v])=>v.cases)} colors={procColors} height={150}/>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>{procEntries.map(([p,v],i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:2,background:procColors[i],flexShrink:0}}/><span style={{fontFamily:C.mono,fontSize:9,color:C.textMid}}>{p} ({v.cases})</span></div>))}</div>
          </div>
        </div>

        {/* FEAT 1: DAILY BREAKDOWN — clickable rows */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:24,overflowX:"auto"}}>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>DAILY BREAKDOWN — LAST 10 WEEKDAYS <span style={{color:C.textDim,fontWeight:400,fontSize:9}}>(click a row to see cases)</span></div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr>{["Date","Cases","Time Worked","Avg Min/Case"].map((h,i)=>(<th key={i} style={{padding:"7px 12px",background:C.surface2,color:C.blue,fontFamily:C.mono,fontSize:10,textAlign:"left",borderBottom:`1px solid ${C.border}`}}>{h}</th>))}</tr></thead>
            <tbody>{last10.map((dk,idx)=>{
              const v=emp.byDay[dk]||{cases:0,totalMin:0};
              const avg=v.cases>0?round1(v.totalMin/v.cases):0;
              const d2=new Date(dk+"T12:00:00");
              const rb=idx%2===0?C.surface:C.surface2;
              const isExpanded=!!expandedDays[dk];
              const dayCases=emp.allCaseDetails.filter(c=>c.dk===dk);
              const isClickable=v.cases>0;
              return(<React.Fragment key={dk}>
                <tr
                  onClick={()=>isClickable&&toggleDay(dk)}
                  style={{cursor:isClickable?"pointer":"default"}}
                >
                  <td style={{padding:"7px 12px",background:rb,color:isExpanded?C.blue:C.text,fontFamily:C.mono,fontSize:11,borderBottom:isExpanded?"none":`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:6}}>
                    {isClickable&&<span style={{fontSize:9,color:C.textDim}}>{isExpanded?"▼":"▶"}</span>}
                    {d2.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
                  </td>
                  <td style={{padding:"7px 12px",background:rb,color:v.cases>0?C.green:C.textDim,fontFamily:C.mono,fontSize:11,borderBottom:isExpanded?"none":`1px solid ${C.border}`}}>{v.cases||"—"}</td>
                  <td style={{padding:"7px 12px",background:rb,color:C.textMid,fontFamily:C.mono,fontSize:11,borderBottom:isExpanded?"none":`1px solid ${C.border}`}}>{v.cases>0?fmtMin(v.totalMin):"—"}</td>
                  <td style={{padding:"7px 12px",background:rb,color:C.textMid,fontFamily:C.mono,fontSize:11,borderBottom:isExpanded?"none":`1px solid ${C.border}`}}>{avg>0?fmtMin(avg):"—"}</td>
                </tr>
                {isExpanded&&dayCases.length>0&&(
                  <tr>
                    <td colSpan={4} style={{padding:"4px 12px 10px",background:rb,borderBottom:`1px solid ${C.border}`}}>
                      <div style={{display:"flex",flexDirection:"column",gap:4,paddingLeft:16,borderLeft:`2px solid ${C.border}`}}>
                        {dayCases.map((c,ci)=>(
                          <div key={ci} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0"}}>
                            <span style={{fontFamily:C.display,fontWeight:700,fontSize:12,color:C.text,minWidth:0,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.caseName}</span>
                            <span style={{fontFamily:C.mono,fontSize:10,color:C.textMid,flexShrink:0}}>◎ {c.processName}</span>
                            <span style={{fontFamily:C.mono,fontSize:10,color:C.blue,flexShrink:0}}>{fmtMin(c.timeMin)}</span>
                          </div>
                        ))}
                      </div>
                    </td>
                  </tr>
                )}
              </React.Fragment>);
            })}</tbody>
          </table>
        </div>

        {/* WEEKLY SUMMARY — untouched */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:16,overflowX:"auto"}}>
          <div style={{fontFamily:C.mono,fontSize:10,color:C.textMid,letterSpacing:"0.1em",marginBottom:12}}>WEEKLY SUMMARY</div>

        <div style={{maxWidth:1100,margin:"0 auto",padding:"24px",position:"relative",zIndex:1}}>
          <div style={{display:"flex",gap:8,marginBottom:24}}>
            {[["active","Active Cases"],["history","My History"]].map(([key,label])=>(<button key={key} onClick={()=>setTab(key)} style={{padding:"8px 20px",borderRadius:20,border:`1px solid ${tab===key?C.blue:C.border}`,background:tab===key?C.blue:"transparent",color:tab===key?"#0d1117":C.textMid,fontFamily:C.display,fontWeight:700,fontSize:15,cursor:"pointer",transition:"all 0.15s"}}>{label}</button>))}
          </div>
          {tab==="active"&&(<>
            {/* FEAT 4: Usage guide box */}
            <UsageGuide/>
            <div style={{marginBottom:32}}>
              <div style={{fontFamily:C.mono,fontSize:11,color:C.textMid,letterSpacing:"0.1em",marginBottom:12,borderBottom:`1px solid ${C.border}`,paddingBottom:8}}>LOG NEW TASK</div>
              <div style={{background:C.surface,border:`1px solid ${maintActive?C.yellow:C.border}`,borderRadius:12,padding:"20px 24px",opacity:maintActive?0.6:1}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                  <div><label style={{fontFamily:C.mono,fontSize:10,color:C.textMid,display:"block",marginBottom:6,letterSpacing:"0.08em"}}>CASE NAME *</label><input value={newCase} onChange={e=>setNewCase(e.target.value)} disabled={maintActive} placeholder="Case / client name" style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,opacity:maintActive?0.5:1}} onFocus={e=>{if(!maintActive)e.target.style.borderColor=C.blue;}} onBlur={e=>e.target.style.borderColor=C.border}/></div>
                  <div><label style={{fontFamily:C.mono,fontSize:10,color:C.textMid,display:"block",marginBottom:6,letterSpacing:"0.08em"}}>PROCESS NAME *</label><input value={newProcess} onChange={e=>setNewProcess(e.target.value)} disabled={maintActive} placeholder="e.g. Scrub, UCC, NOD Draft..." style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,opacity:maintActive?0.5:1}} onFocus={e=>{if(!maintActive)e.target.style.borderColor=C.blue;}} onBlur={e=>e.target.style.borderColor=C.border}/></div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                  <div><label style={{fontFamily:C.mono,fontSize:10,color:C.textMid,display:"block",marginBottom:6,letterSpacing:"0.08em"}}>STATUS</label><select value={newState} onChange={e=>setNewState(e.target.value)} disabled={maintActive} style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,appearance:"none",cursor:maintActive?"not-allowed":"pointer",opacity:maintActive?0.5:1}}><option value={S.STARTED}>▶ On this — Starting</option><option value={S.PAUSED}>⏸ On Hold — Pause</option><option value={S.RESUMED}>↺ Resuming — Resume</option><option value={S.DONE}>✓ Done, Completed — Finish</option></select></div>
                  <div><label style={{fontFamily:C.mono,fontSize:10,color:C.textMid,display:"block",marginBottom:6,letterSpacing:"0.08em"}}>ADDITIONAL NOTES</label><div style={{display:"flex",gap:8,alignItems:"center"}}><input value={newNotes} onChange={e=>setNewNotes(e.target.value)} disabled={maintActive} placeholder="Optional..." style={{flex:1,background:C.surface2,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,opacity:maintActive?0.5:1}} onFocus={e=>{if(!maintActive)e.target.style.borderColor=C.blue;}} onBlur={e=>e.target.style.borderColor=C.border}/><div style={{display:"flex",alignItems:"center",gap:6,cursor:maintActive?"not-allowed":"pointer",flexShrink:0,opacity:maintActive?0.4:1}} onClick={()=>!maintActive&&setNewUrgent(v=>!v)}><div style={{width:18,height:18,borderRadius:4,border:`2px solid ${newUrgent?C.yellow:C.border}`,background:newUrgent?"#7c5800":"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>{newUrgent&&<span style={{color:"#ffd666",fontSize:11}}>✓</span>}</div><span style={{fontFamily:C.display,fontWeight:700,fontSize:14,color:newUrgent?"#ffd666":C.textMid}}>⚡ Urgent</span></div></div></div>
                </div>
                {formErr&&<p style={{color:maintActive?C.yellow:C.red,fontFamily:C.mono,fontSize:11,marginBottom:10}}>{formErr}</p>}
                <button onClick={handleSubmit} disabled={submitting||maintActive} style={{padding:"10px 22px",background:maintActive?"#1c1000":submitting?C.surface2:C.blue,color:maintActive?C.yellow:submitting?C.textMid:"#0d1117",border:`1px solid ${maintActive?C.yellow:"transparent"}`,borderRadius:8,fontFamily:C.display,fontWeight:700,fontSize:15,cursor:submitting||maintActive?"not-allowed":"pointer"}}>{maintActive?"🔧 Maintenance — blocked":submitting?"Saving...":"+ Log Task"}</button>
              </div>
            </div>
            {loading?(<div style={{textAlign:"center",padding:40,color:C.textMid,fontFamily:C.mono,fontSize:13}}>Loading data...</div>):(<>
              <ForgottenCasesAlert cases={activeCases} now={now}/>
              {activeCases.length>0&&(<div style={{marginBottom:28}}><div style={{fontFamily:C.mono,fontSize:11,color:C.textMid,letterSpacing:"0.1em",marginBottom:12,borderBottom:`1px solid ${C.border}`,paddingBottom:8,display:"flex",justifyContent:"space-between"}}><span>IN PROGRESS</span><span style={{color:C.green}}>{activeCases.length} active</span></div><div style={{display:"flex",flexDirection:"column",gap:10}}>{activeCases.map(c=><CaseCard key={c.key} caso={c} onAction={handleAction} now={now}/>)}</div></div>)}
              {doneCases.length>0&&(<div><div style={{fontFamily:C.mono,fontSize:11,color:C.textMid,letterSpacing:"0.1em",marginBottom:12,borderBottom:`1px solid ${C.border}`,paddingBottom:8,display:"flex",justifyContent:"space-between"}}><span>COMPLETED TODAY</span><span>{doneCases.length} case{doneCases.length>1?"s":""}</span></div><div style={{display:"flex",flexDirection:"column",gap:10}}>{doneCases.map(c=><CaseCard key={c.key} caso={c} onAction={handleAction} now={now}/>)}</div></div>)}
              {activeCases.length===0&&doneCases.length===0&&(<div style={{textAlign:"center",padding:"48px 24px",background:C.surface,border:`1px dashed ${C.border}`,borderRadius:12,color:C.textDim,fontFamily:C.mono,fontSize:13}}><div style={{fontSize:32,marginBottom:12}}>📋</div>No tasks logged today.<br/>Use the form above to log a new one.</div>)}
            </>)}
          </>)}
          {tab==="history"&&(loading?<div style={{textAlign:"center",padding:40,color:C.textMid,fontFamily:C.mono,fontSize:13}}>Loading history...</div>:<HistoryTab rows={rows} now={now}/>)}
        </div>
        <Footer/>
      </div>);
    }

    // ── LOGIN ──────────────────────────────────────────────────────────────────
    function LoginScreen({onLogin,maintActive}){
      const [val,setVal]=useState(""),[err,setErr]=useState(""),[loading,setLoading]=useState(false);
      const submit=async()=>{if(!val.trim()){setErr("Enter your email or username");return;}setLoading(true);await delay(300);onLogin(val.trim().toLowerCase());setLoading(false);};
      return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"48px 16px",position:"relative"}}>
        <GridBg/>
        {maintActive&&<div style={{position:"fixed",top:0,left:0,right:0,zIndex:200}}><MaintenanceBanner/></div>}
        <div style={{display:"flex",alignItems:"center",gap:18,marginBottom:24,zIndex:1}}><LxLogo size={72}/><div><h1 style={{fontFamily:C.display,fontWeight:800,fontSize:42,color:C.text,letterSpacing:"-0.5px",lineHeight:1.1}}>Lexington Recovery</h1><p style={{fontFamily:C.mono,fontSize:13,color:C.textMid,marginTop:4}}>Case Tracking & Management</p></div></div>
        <div style={{width:"100%",maxWidth:560,height:1,background:C.border,marginBottom:32,zIndex:1}}/>
        <div style={{width:"100%",maxWidth:560,background:C.surface,border:`1px solid ${C.border}`,borderRadius:16,padding:"36px 32px",zIndex:1,animation:"fadeIn 0.4s ease"}}>
          <h2 style={{fontFamily:C.display,fontWeight:800,fontSize:38,color:C.text,marginBottom:8}}>Sign In</h2>
          <p style={{fontFamily:C.mono,fontSize:13,color:C.textMid,marginBottom:28}}>Enter your email or name to continue</p>
          <label style={{fontFamily:C.mono,fontSize:11,color:C.textMid,letterSpacing:"0.08em",display:"block",marginBottom:8}}>EMAIL OR USERNAME</label>
          <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="e.g. ana@lexingtonrecovery.com" style={{width:"100%",background:C.surface2,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",color:C.text,fontSize:15,marginBottom:err?8:20}} onFocus={e=>e.target.style.borderColor=C.blue} onBlur={e=>e.target.style.borderColor=C.border}/>
          {err&&<p style={{color:C.red,fontSize:12,fontFamily:C.mono,marginBottom:12}}>{err}</p>}
          <button onClick={submit} disabled={loading} style={{width:"100%",padding:"16px",background:loading?C.surface2:C.blue,color:loading?C.textMid:"#0d1117",border:"none",borderRadius:10,fontSize:16,fontWeight:700,fontFamily:C.display,cursor:loading?"not-allowed":"pointer"}}>{loading?"Connecting...":"Sign In →"}</button>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0}}><Footer/></div>
      </div>);
    }

    // ── ROOT ───────────────────────────────────────────────────────────────────
    function App(){
      const [screen,setScreen]=useState("login"),[user,setUser]=useState(null);
      // FEAT 5: maintenance state lives here so it propagates to all screens
      const [maintActive,setMaintActive]=useState(false);
      return(<>
        {screen==="login"     &&<LoginScreen onLogin={u=>{setUser(u);setScreen("app");}} maintActive={maintActive}/>}
        {screen==="app"       &&<Dashboard user={user} onLogout={()=>{setUser(null);setScreen("login");}} onAdmin={()=>setScreen("adminLogin")} maintActive={maintActive}/>}
        {screen==="adminLogin"&&<AdminLogin onSuccess={()=>setScreen("admin")} onBack={()=>setScreen(user?"app":"login")}/>}
        {screen==="admin"     &&<AdminDashboard onLogout={()=>setScreen(user?"app":"login")} onMaintChange={v=>{MAINT.active=v;setMaintActive(v);}}/>}
      </>);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
